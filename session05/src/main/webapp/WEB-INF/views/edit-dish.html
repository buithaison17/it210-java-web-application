<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:object="${dish}" th:action="@{/bai3/update}" method="post">
    <label for="id">Id</label>
    <input th:field="*{id}" type="text" name="id" id="id">
    <br>
    <label for="name"></label>
    <input th:field="*{name}" type="text" name="name" id="name">
    <br>
    <label for="description">Description</label>
    <input th:field="*{description}" type="text" name="description" id="description">
    <br>
    <label for="price">Price</label>
    <input th:field="*{price}" type="number" name="price" id="price">
    <br>
    <button type="submit">Edit</button>
</form>
</body>
</html>
