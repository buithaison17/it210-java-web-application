<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <tr>
        <th>Name</th>
        <th>Price</th>
    </tr>
    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.name}">Pizza</td>
        <td th:text="${dish.price}">10</td>
        <td><a th:href="@{'/bai5/order/' + ${dish.id}}">Order</a></td>
    </tr>
</table>
</body>
</html>
